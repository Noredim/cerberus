version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cerberus_db_prod
    restart: always
    environment:
      POSTGRES_USER: cerberus
      POSTGRES_PASSWORD: W@rs26
      POSTGRES_DB: cerberus
    volumes:
      - /opt/cerberus/data/postgres:/var/lib/postgresql/data
    networks:
      - cerberus_prod_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cerberus -d cerberus" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cerberus_api_prod
    restart: always
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://cerberus:W@rs26@db:5432/cerberus
      - ALLOWED_ORIGINS=https://cerberus.warslab.com.br
      - JWT_SECRET=e2c8ef16a06b9bb429d475a841f6c8b3782ba2bcf799adc7106927e69ce234cd
    volumes:
      - /opt/cerberus/data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cerberus_prod_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: cerberus_web_prod
    restart: always
    environment:
      - VITE_API_URL=/api
    networks:
      - cerberus_prod_network

  tax-engine:
    build: ./engines/tax_engine
    container_name: cerberus_tax_engine_prod
    restart: always
    networks:
      - cerberus_prod_network

  cost-engine:
    build: ./engines/cost_engine
    container_name: cerberus_cost_engine_prod
    restart: always
    networks:
      - cerberus_prod_network

  pricing-engine:
    build: ./engines/pricing_engine
    container_name: cerberus_pricing_engine_prod
    restart: always
    networks:
      - cerberus_prod_network

  contract-engine:
    build: ./engines/contract_engine
    container_name: cerberus_contract_engine_prod
    restart: always
    networks:
      - cerberus_prod_network

  gateway:
    image: nginx:stable-alpine
    container_name: cerberus_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - cerberus_prod_network

networks:
  cerberus_prod_network:
    driver: bridge
